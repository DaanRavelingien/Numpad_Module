# ── USB / Bluetooth ───────────────────────────────────────────────────────────
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_BT_DEVICE_NAME="Numpad_DR"
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# ── Power management ──────────────────────────────────────────────────────────
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_SLEEP=y

# ── RGB underglow ─────────────────────────────────────────────────────────────
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=20
CONFIG_SPI=y

# ── Display ───────────────────────────────────────────────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y      # shows battery level
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y       # shows USB or BLE connection
CONFIG_ZMK_DISPLAY_INVERT=y             # invert colors (white-on-black)
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y  # prevents display updates from blocking key scanning