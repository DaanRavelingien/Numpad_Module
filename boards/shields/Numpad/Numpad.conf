# ── USB / Bluetooth ──────────────────────────────────────────────────────────

CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_BT_DEVICE_NAME="Numpad_DR"

# Allow switching between USB and BLE at runtime
CONFIG_ZMK_OUTPUT_DEFAULT=n        # last-used output persists across boot
# CONFIG_ZMK_OUTPUT_DEFAULT=y      # uncomment to always start on BLE

# Number of paired BLE hosts (up to 5 on nRF52840)
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# Directed advertising — reconnects faster to the last paired host
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Enable consumer (media) HID report — needed for some hosts
# CONFIG_ZMK_HID_CONSUMER_REPORT=y


# ── Power management ─────────────────────────────────────────────────────────

# Deep sleep after idle period (saves battery)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000     # 5 minutes → idle
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000  # 15 minutes → deep sleep

# Turn off LEDs before sleep
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n   # keep LEDs on when plugged in


# ── RGB underglow (per-key LEDs, WS2812 / SK6812) ────────────────────────────

CONFIG_ZMK_RGB_UNDERGLOW=y

# Use the SPI-based WS2812 driver (nice!nano uses SPI for the data line)
CONFIG_WS2812_STRIP=y
CONFIG_SPI=y

# Default colour on boot  (HSB: hue 0–359, sat 0–100, bri 0–100)
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRI_START=40

# Fade animation step size (lower = smoother, more CPU)
CONFIG_ZMK_RGB_UNDERGLOW_BRI_STEP=5
CONFIG_ZMK_RGB_UNDERGLOW_HUE_STEP=10
CONFIG_ZMK_RGB_UNDERGLOW_SAT_STEP=10

# Restore last RGB state after power-cycle
CONFIG_ZMK_RGB_UNDERGLOW_SAVE_STATE=y

# Animation effect on boot (0 = solid, 1 = breathe, 2 = spectrum, 3 = swirl)
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0


# ── Logging (disable for production builds to save flash & battery) ──────────

CONFIG_ZMK_LOG_LEVEL_WARN=y
# CONFIG_ZMK_LOG_LEVEL_DBG=y       # uncomment for verbose USB/BT debugging